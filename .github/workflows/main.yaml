name: CI

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Construir con Maven
        run: mvn clean package -DskipTests

      - name: Guardar paquete generado para el trabajo de despliegue
        uses: actions/upload-artifact@v4
        with:
          name: moviecards-java
          path: "${{ github.workspace }}/target/*.jar"

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Instalar Chrome y ChromeDriver para pruebas end to end
        run: |
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb
          sudo apt --fix-broken install -y
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+')
          CHROMEDRIVER_VERSION=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/LATEST_RELEASE_${CHROME_VERSION%%.*}")
          curl -L -o chromedriver.zip "https://storage.googleapis.com/chrome-for-testing-public/${CHROMEDRIVER_VERSION}/linux64/chromedriver-linux64.zip"
          unzip chromedriver.zip
          chmod +x chromedriver-linux64/chromedriver
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/

      - name: Ejecutar la aplicación para pruebas end to end
        run: mvn spring-boot:run &

      - name: Esperar a que la aplicación arranque
        run: |
          until curl -sf http://localhost:8080/actuator/health | grep -q '"status":"UP"'; do
            echo "Waiting for app..."
            sleep 5
          done

      - name: Ejecutar las pruebas unitarias, de integración y end to end
        run: mvn clean verify

  qa:
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      sonarqube:
        image: sonarqube:community
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/api/system/status || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 10

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Wait for SonarQube to be ready
        run: |
          until curl -sf http://localhost:9000/api/system/status | grep -q '"status":"UP"'; do
            echo "Waiting for SonarQube..."
            sleep 10
          done

      - name: Debug SonarQube auth
        run: |
          echo "=== Testing default admin:admin ==="
          curl -v -u admin:admin http://localhost:9000/api/authentication/validate
          echo ""
          echo "=== Trying password change ==="
          curl -v -u admin:admin -X POST "http://localhost:9000/api/users/change_password" \
            -d "login=admin&previousPassword=admin&password=Admin1234!"
          echo ""
          echo "=== Testing new password ==="
          curl -v -u admin:Admin1234! http://localhost:9000/api/authentication/validate

      - name: Generar token de SonarQube
        id: sonar_token
        run: |
          RESPONSE=$(curl -s -u admin:Admin1234! -X POST \
            "http://localhost:9000/api/user_tokens/generate" \
            -d "name=ci-token-${{ github.run_id }}")
          echo "Token response: $RESPONSE"
          TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Construir con Maven
        run: mvn clean package -DskipTests

      - name: Revisar la calidad con Sonarqube
        run: |
          mvn sonar:sonar \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token=${{ steps.sonar_token.outputs.token }} \
            -Dsonar.qualitygate.wait=true

  deploy:
    needs: qa
    runs-on: ubuntu-latest
    steps:
      - name: despliegue
        run: echo "despliegue"